version: "3.9"

services:
  attendance-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-system
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
