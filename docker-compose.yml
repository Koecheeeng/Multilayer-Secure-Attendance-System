services:
  attendance-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance-system
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT:-3000}/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
