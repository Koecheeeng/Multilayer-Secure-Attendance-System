<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance System — Login</title>
  <meta name="description" content="Sign in to the Attendance System portal." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://exbkjyumgylzhxpomfnx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4YmtqeXVtZ3lsemh4cG9tZm54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTUxMDIsImV4cCI6MjA5MjkzMTEwMn0.ijaYx0V2qjvyjMdPA1V_4fovdEIkH3di5Tf-0m6GVxk';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const API_BASE = '/api/admin';

    function qs(id) { return document.getElementById(id); }

    function setMessage(node, text, ok = true) {
      if (!node) return;
      node.textContent = text;
      node.className = 'message ' + (ok ? 'ok' : 'error');
      node.style.display = text ? 'block' : 'none';
    }

    async function signIn() {
      const msgEl = qs('loginMessage');
      setMessage(msgEl, '');

      const email = qs('emailInput').value.trim();
      const password = qs('passwordInput').value;

      if (!email || !password) {
        setMessage(msgEl, 'Email and password are required', false);
        return;
      }

      // Disable button while processing
      const btn = qs('btnSignIn');
      btn.disabled = true;
      btn.textContent = 'SIGNING IN...';

      try {
        const { data: authData, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          setMessage(msgEl, error.message, false);
          btn.disabled = false;
          btn.textContent = 'LOGIN';
          return;
        }

        // Fetch user profile to determine role
        const token = authData.session.access_token;
        const response = await fetch(`${API_BASE}/me`, {
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          }
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          setMessage(msgEl, payload.error || 'Failed to fetch profile', false);
          btn.disabled = false;
          btn.textContent = 'LOGIN';
          return;
        }

        const role = payload.data?.role || 'staff';

        // Redirect based on role
        if (role === 'admin') {
          window.location.href = '/admin.html';
        } else if (role === 'manager') {
          window.location.href = '/manager.html';
        } else {
          // Unknown role — default to admin for now
          window.location.href = '/admin.html';
        }

      } catch (err) {
        setMessage(msgEl, 'Network error: ' + err.message, false);
        btn.disabled = false;
        btn.textContent = 'LOGIN';
      }
    }

    // Check if already logged in on page load
    async function checkExistingSession() {
      const { data } = await supabase.auth.getSession();
      if (!data?.session) return; // No session, show login form

      try {
        const token = data.session.access_token;
        const response = await fetch(`${API_BASE}/me`, {
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`
          }
        });

        if (!response.ok) {
          // Token expired, clear it
          await supabase.auth.signOut();
          return;
        }

        const payload = await response.json();
        const role = payload.data?.role || 'staff';

        if (role === 'admin') {
          window.location.href = '/admin.html';
        } else if (role === 'manager') {
          window.location.href = '/manager.html';
        }
        // For other roles, stay on login page
      } catch (err) {
        console.error('Session check failed:', err);
        await supabase.auth.signOut();
      }
    }

    // Init
    async function init() {
      try {
        // Attach event listeners
        qs('btnSignIn').addEventListener('click', signIn);
        ['emailInput', 'passwordInput'].forEach(id => {
          qs(id).addEventListener('keydown', (e) => { if (e.key === 'Enter') signIn(); });
        });

        // Check for existing session
        await checkExistingSession();
      } catch (err) {
        console.error('[LOGIN INIT] Error:', err);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

  <style>
    :root {
      --bg: #f4f4f4;
      --surface: #ffffff;
      --text: #111111;
      --muted: #667085;
      --primary: #564cff;
      --success: #067647;
      --danger: #b42318;
      --border: rgba(0, 0, 0, 0.12);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8f8f8 0%, #ececec 100%);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px 14px 24px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #6547ff, #8b5cf6);
      box-shadow: 0 12px 26px rgba(91, 75, 255, 0.28);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .brand-copy {
      display: grid;
      line-height: 1.05;
    }

    .brand-copy strong {
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .brand-copy span {
      font-size: 14px;
      color: var(--muted);
    }

    .project-code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #2d2dea;
      white-space: nowrap;
    }

    .login-screen {
      min-height: calc(100vh - 84px);
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 10%, rgba(91, 75, 255, 0.06), transparent 30%),
        linear-gradient(180deg, #f8f8f8 0%, #ececec 100%);
    }

    .login-card {
      width: min(480px, 100%);
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 30px 90px rgba(17, 17, 17, 0.10);
      border: 1px solid rgba(0, 0, 0, 0.08);
      padding: clamp(28px, 4vw, 42px);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: auto -80px -110px auto;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(91, 75, 255, 0.18), transparent 68%);
      pointer-events: none;
    }

    .login-title {
      margin: 0 0 24px;
      font-size: clamp(40px, 6vw, 64px);
      color: #5a41ff;
      letter-spacing: -0.08em;
      line-height: 0.95;
      font-weight: 900;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    }

    .login-form {
      border-radius: 24px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      background: linear-gradient(180deg, #ffffff 0%, #f3f3f3 100%);
      padding: 18px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75), 0 20px 30px rgba(0, 0, 0, 0.05);
    }

    .login-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .login-input {
      width: 100%;
      min-height: 50px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.22);
      padding: 14px 16px;
      outline: none;
      background: #fff;
      font-size: 15px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    .login-input:focus {
      border-color: rgba(91, 75, 255, 0.55);
      box-shadow: 0 0 0 4px rgba(91, 75, 255, 0.10);
    }

    .login-btn {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(90deg, #564cff, #9b5df5);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 14px 28px rgba(86, 76, 255, 0.28);
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 18px 32px rgba(86, 76, 255, 0.36);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .login-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 6px 0;
      font-size: 13px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .message.ok {
      color: var(--success);
    }

    .message.error {
      color: var(--danger);
    }

    @media (max-width: 720px) {
      .topbar {
        height: auto;
        flex-direction: column;
        align-items: flex-start;
      }

      .project-code {
        font-size: 18px;
      }

      .login-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
            <line x1="8" y1="14" x2="8" y2="14.01" />
            <line x1="12" y1="14" x2="12" y2="14.01" />
            <line x1="16" y1="14" x2="16" y2="14.01" />
            <line x1="8" y1="18" x2="8" y2="18.01" />
            <line x1="12" y1="18" x2="12" y2="18.01" />
            <line x1="16" y1="18" x2="16" y2="18.01" />
          </svg>
        </div>
        <div class="brand-copy">
          <strong>Attendance System</strong>
          <span>Dashboard Login</span>
        </div>
      </div>

      <div class="project-code">#EX4MPL3</div>
    </header>

    <main class="login-screen">
      <section class="login-card">
        <h1 class="login-title">Welcome</h1>
        <div class="login-form">
          <div class="login-grid">
            <input id="emailInput" class="login-input" type="email" placeholder="Email address" autocomplete="email" />
            <input id="passwordInput" class="login-input" type="password" placeholder="Password"
              autocomplete="current-password" />
            <button id="btnSignIn" class="login-btn">LOGIN</button>
          </div>
          <div class="login-footer">
            <span>Sign in with your account.</span>
            <span id="loginMessage" class="message" style="margin:0; display:none;"></span>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>

</html>
