<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance System — Manager Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://exbkjyumgylzhxpomfnx.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_TY6CkWK_mmuixh55B7ZIQQ_YXI9UavD';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function signOut() {
      try { await supabase.auth.signOut(); } catch (_) {}
      window.location.href = '/login.html';
    }
    window.signOut = signOut;

    async function init() {
      const { data } = await supabase.auth.getSession();
      if (!data?.session) {
        window.location.href = '/login.html';
        return;
      }

      document.getElementById('signOutBtn').addEventListener('click', signOut);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: linear-gradient(180deg, #f8f8f8 0%, #ececec 100%);
      color: #111;
      min-height: 100vh;
    }
    .topbar {
      height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-mark {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #6547ff, #8b5cf6);
      box-shadow: 0 12px 26px rgba(91,75,255,0.28);
      display: grid; place-items: center;
    }
    .brand-copy { display: grid; line-height: 1.05; }
    .brand-copy strong { font-size: 24px; letter-spacing: -0.03em; }
    .brand-copy span { font-size: 14px; color: #667085; }
    .hero-right { display: flex; align-items: center; gap: 16px; }
    .project-code {
      font-family: ui-monospace, monospace;
      font-size: 26px; font-weight: 800;
      color: #2d2dea;
    }
    .ghost-btn {
      border: 0; border-radius: 14px; padding: 12px 16px;
      font-weight: 700; background: #fff; color: #111;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12);
      cursor: pointer; transition: transform .14s ease;
    }
    .ghost-btn:hover { transform: translateY(-1px); }
    .content {
      display: grid; place-items: center; min-height: calc(100vh - 84px);
      padding: 40px;
    }
    .placeholder-card {
      background: rgba(255,255,255,0.96);
      border-radius: 28px; padding: 60px 48px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.08);
      text-align: center; max-width: 600px;
    }
    .placeholder-card h1 {
      font-size: 42px; letter-spacing: -0.05em;
      margin: 0 0 12px; color: #5a41ff;
    }
    .placeholder-card p { color: #667085; font-size: 16px; margin: 0; }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">
        <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
      </div>
      <div class="brand-copy">
        <strong>Attendance System</strong>
        <span>Manager Dashboard</span>
      </div>
    </div>
    <div class="hero-right">
      <div class="project-code">#EX4MPL3</div>
      <button id="signOutBtn" class="ghost-btn">Sign out</button>
    </div>
  </header>

  <main class="content">
    <div class="placeholder-card">
      <h1>Manager Dashboard</h1>
      <p>This page is under construction. You can manage it later.</p>
    </div>
  </main>
</body>

</html>
